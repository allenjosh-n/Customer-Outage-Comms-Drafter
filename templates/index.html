<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Customer Outage Comms Drafter</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Customer Outage Comms Drafter</h1>

    <label>Technical Timeline</label>

    <textarea
        id="timeline"
        placeholder="Enter outage timeline here...">
    </textarea>

    <label>Severity</label>

    <select id="severity">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <label>Tone</label>

    <select id="tone">
        <option>Calm</option>
        <option>Empathetic</option>
        <option>Concise</option>
    </select>

    <button id="generateBtn"
            onclick="generateDraft()">
        Generate
    </button>

    <div class="card">
        <h2>Initial Update</h2>
        <p id="initial"></p>
        <button onclick="copyText('initial')">
            Copy
        </button>
    </div>

    <div class="card">
        <h2>Progress Update</h2>
        <p id="progress"></p>
        <button onclick="copyText('initial')">
            Copy
        </button>
    </div>

    <div class="card">
        <h2>Resolved Update</h2>
        <p id="resolved"></p>
        <button onclick="copyText('initial')">
            Copy
        </button>
    </div>

    <div class="card">
        <h2>Internal Incident Summary</h2>
        <p id="summary"></p>
        <button onclick="copyText('initial')">
            Copy
        </button>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}">
</script>

</body>

</html>
